<style id="wp-custom-css">

/* Logo-Styles */
.logo.avia-svg-logo {
  display: block;
  max-width: 450px;
  width: 450px;
  height: auto;
  margin-top: 15px;
}

.my-svg-logo img {
  width: 300px;
  height: auto;
  max-width: 400px;
}

@media only screen and (max-width: 1140px) {
  .logo.avia-svg-logo {
  max-width: 300px;
  width: 300px;
  margin-top: 25px;
  }
}

/* Media Query: Verstecke Logo ab 1140px */
@media only screen and (max-width: 767px) {
  .logo.avia-svg-logo {
    display: none !important;
  }
}

/* Allgemeine Elemente ausblenden */
.ls-gui-element.ls-circle-timer {
  display: none !important;
}

/* Rotation & mobilerotation */
.rotation img {
  border-radius: 30px;
}

.rotation {
  display: block;
}

.mobilerotation {
  display: none;
}

/* Responsive Anpassungen für Rotation */
@media screen and (max-width: 767px) {
  .rotation {
    display: none;
  }
  .mobilerotation {
    display: block;
  }
}

/* Auf Handys: Keine Rundung */
@media (max-width: 768px) {
  .rotation img {
    border-radius: 0;
  }
}

/* Responsive Anpassungen für Rotation */
@media screen and (max-width: 1351px) {
  .kontaktformular {
    display: none;
  }
	.kontaktformular2 {
    padding: 80px 0% 0 0% !important;
  }
}

/* Weitere Elemente */
.my-overlap-box {
  padding: 0 15%;
}

/* Hover Effekt im Footer */
.avia-image-container:hover .image-overlay {
  display: none !important;
}

/* Facts-Box */
.facts {
  width: 76.5%;
  margin: 0 auto;
}

/* Responsive Anpassungen (max-width: 767px) */
@media only screen and (max-width: 767px) {
  .my-overlap-box2 {
    box-shadow: none !important;
    border-radius: 0 !important;
    padding: 0 !important;
    background-color: transparent !important;
  }

  .my-overlap-box {
    padding: 0 !important;
    margin-top: 50px !important;
  }

  .facts {
    width: 100%;
    margin: 0 auto;
  }
}

/* Kontakt-Styles */
.contact {
  font-size: 12px;
  padding: 0;
  z-index: 100;
}

/* Enfold-Formularfelder */
.avia_ajax_form input[type="text"],
.avia_ajax_form input[type="email"],
.avia_ajax_form input[type="url"],
.avia_ajax_form input[type="tel"],
.avia_ajax_form input[type="search"],
.avia_ajax_form input[type="password"],
.avia_ajax_form textarea,
.avia_ajax_form select {
  padding: 6px !important;
  margin: 0 !important;
  border-width: 1px !important;
}

#top div .av-dark-form .input-text,
#top div .av-dark-form input[type=email],
#top div .av-dark-form input[type=input],
#top div .av-dark-form input[type=number],
#top div .av-dark-form input[type=password],
#top div .av-dark-form input[type=search],
#top div .av-dark-form input[type=tel],
#top div .av-dark-form input[type=text],
#top div .av-dark-form input[type=url],
#top div .av-dark-form select,
#top div .av-dark-form textarea,
div div .av-dark-form .button {
  border-width: 1px !important;
}

/* Startseite: Header-Logo ausblenden */
.home .av_header_transparency .logo.avia-svg-logo {
  display: none !important;
}

/* Untermenü für mobile Geräte */
@media only screen and (max-width: 768px) {
  #top .av-subnav-menu {
    font-size: 9px;
    position: relative;
    left: 50%;
    width: 100vw;
    margin-left: -50vw;
    box-sizing: border-box;
  }

  #top .av-subnav-menu > li > a {
    padding: 0 6px;
  }
}

/* Tooltip und Tab Titel */
.avia-tooltip .inner_tooltip {
  font-size: 0.825em;
}

.av-inner-tab-title {
  font-size: 12px;
}

/* Seite 1987: Farben und Hover-Effekte */
.page-id-1987 h2,
.page-id-1987 h3,
.page-id-1987 h4,
.page-id-1987 h5,
.page-id-1987 h6 {
  color: #5dade2 !important;
}

.page-id-1987 .avia-icon-list-container,
.page-id-1987 .avia-icon-list-container p {
  color: black;
