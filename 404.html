<!DOCTYPE html>
<html lang="de">
<head>

<style>
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:#faf7f2; color:#2d2d2a; font-family:'Quicksand','Helvetica Neue',Arial,sans-serif;
         text-align:center; padding:24px; box-sizing:border-box; }
  .wrap { max-width:520px; }
  .mark { font-size:28px; letter-spacing:10px; font-weight:300; color:#3a4a3a; margin-bottom:36px; }
  .mark b { color:#678266; font-weight:300; }
  h1 { font-size:22px; font-weight:600; margin:0 0 12px; }
  p { color:#55554f; line-height:1.6; margin:0 0 28px; }
  .links { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
  .links a { border:1px solid #678266; color:#678266; text-decoration:none;
             border-radius:999px; padding:10px 22px; font-size:14px; transition:all .2s; }
  .links a:hover, .links a.primary { background:#678266; color:#faf7f2; }
</style>
</head>
<body>
<div class="wrap">
  <div class="mark">WALDGEFL&Uuml;STER<b>!</b></div>
  <h1>Diese Seite gibt es nicht (mehr).</h1>
  <p>Vielleicht hat sich der Link ge&auml;ndert &ndash; bei uns findet ihr trotzdem alles rund um Hochzeiten, Feiern und Events im Wald.</p>
  <div class="links">
    <a class="primary" data-rel="" href="/">Zur Startseite</a>
    <a data-rel="heiraten-schwaebische-alb/" href="/heiraten-schwaebische-alb/">Heiraten</a>

  </div>
</div>
<script>
/* Links funktionieren sowohl unter GitHub-Pages-Subpath als auch spaeter unter eigener Domain */
(function(){
  var base = location.pathname.indexOf('/waldgefluester_website') === 0 ? '/waldgefluester_website/' : '/';
  document.querySelectorAll('a[data-rel]').forEach(function(a){ a.href = base + a.getAttribute('data-rel'); });
})();
</script>
</body>
</html>
